<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>毕业季 · 照片墙</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --ink:#2D2D3F; --ink2:#6B6B80; --ink3:#9B8BA8;
    --c1:#6CB4EE; --c2:#7B8CFF; --c3:#A78BFA; --c4:#D4A5FF; --c5:#FF9A9E; --c6:#FFCD56; --c7:#A8D8C8;
    --paper:#FEFCF9;
  }
  html,body{height:100%;}
  body{
    font-family:'PingFang SC','Hiragino Sans GB','Noto Serif SC','Microsoft YaHei',serif;
    background:var(--paper);
    background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    color:var(--ink); min-height:100vh; min-height:100dvh; overflow-x:hidden;
    -webkit-font-smoothing:antialiased; user-select:none; -webkit-user-select:none;
  }
  #particleCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}

  /* ============ 通用屏 ============ */
  .screen{position:fixed;inset:0;z-index:1;display:none;}
  .screen.active{display:block;}

  /* ============ 封面 ============ */
  #cover.active{display:flex;align-items:center;justify-content:center;padding:24px;}
  .cover-flare{position:fixed;top:24%;left:50%;transform:translate(-50%,-50%);width:240px;height:240px;border-radius:50%;
    background:radial-gradient(circle,rgba(180,200,240,.12) 0%,rgba(200,180,220,.06) 40%,transparent 70%);
    pointer-events:none;z-index:0;animation:flareBreathe 5s ease-in-out infinite;}
  @keyframes flareBreathe{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7}50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}}

  .film-strip{position:fixed;z-index:2;pointer-events:none;height:40px;opacity:0;left:0;width:100%;}
  .film-strip.top{top:4%;animation:filmTop 4.5s ease-out forwards;}
  .film-strip.bottom{bottom:4%;animation:filmBottom 4.5s ease-out forwards;}
  @keyframes filmTop{0%{opacity:0;transform:translateX(-100%)}12%{opacity:1;transform:translateX(0)}55%{opacity:.85}100%{opacity:.55;transform:translateY(-6px)}}
  @keyframes filmBottom{0%{opacity:0;transform:translateX(100%)}12%{opacity:1;transform:translateX(0)}55%{opacity:.85}100%{opacity:.55;transform:translateY(6px)}}
  .film-body{width:100%;height:100%;background:#1a1a1a;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.2);}
  .film-body::before{content:'';position:absolute;top:5px;bottom:5px;left:4px;right:4px;border-top:2px dashed rgba(255,255,255,.45);border-bottom:2px dashed rgba(255,255,255,.45);}
  .film-scroll{position:absolute;top:6px;bottom:6px;display:flex;gap:3px;animation:filmInner 4s linear infinite;}
  .bottom .film-scroll{animation-direction:reverse;animation-duration:3.5s;}
  @keyframes filmInner{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  .film-frame{min-width:48px;height:100%;border-radius:2px;flex-shrink:0;}

  .big-camera{font-size:74px;position:fixed;top:42%;left:50%;z-index:3;pointer-events:none;
    transform:translate(-50%,-50%);filter:drop-shadow(0 0 30px rgba(200,180,240,.6));
    animation:camEntrance 3.4s cubic-bezier(.22,.61,.36,1) forwards;}
  @keyframes camEntrance{0%{transform:translate(-50%,-50%) scale(0) rotate(-30deg);opacity:0}8%{transform:translate(-50%,-50%) scale(1.4) rotate(5deg);opacity:1}18%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1}55%{transform:translate(-50%,-50%) scale(1);opacity:1}65%{transform:translate(-50%,-50%) scale(.75);opacity:.5}100%{transform:translate(-50%,-50%) scale(0) rotate(20deg);opacity:0}}
  .cover-flash{position:fixed;inset:0;background:#fff;opacity:0;z-index:3;pointer-events:none;animation:flashBurst 3.4s ease-out forwards;}
  @keyframes flashBurst{0%{opacity:0}6%{opacity:.9}20%{opacity:0}100%{opacity:0}}
  .spark{position:fixed;width:4px;height:4px;border-radius:50%;background:#fff;z-index:3;pointer-events:none;opacity:0;
    box-shadow:0 0 8px 3px rgba(220,200,240,.8);animation:sparkFly 3.4s ease-out forwards;}
  @keyframes sparkFly{0%{opacity:0;transform:translate(0,0) scale(0)}8%{opacity:1;transform:translate(var(--sx),var(--sy)) scale(1)}100%{opacity:0;transform:translate(calc(var(--sx)*3.5),calc(var(--sy)*3.5)) scale(0)}}

  .cover-inner{width:100%;max-width:380px;text-align:center;position:relative;z-index:4;display:flex;flex-direction:column;align-items:center;gap:14px;}
  .cam-logo{font-size:46px;opacity:0;animation:logoIn .8s 3.4s cubic-bezier(.22,.61,.36,1) forwards, shutter 2.6s 4.4s ease-in-out infinite;filter:drop-shadow(0 0 8px rgba(180,200,240,.5));}
  @keyframes logoIn{from{opacity:0;transform:scale(.3) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}
  @keyframes shutter{0%,80%,100%{transform:scale(1)}5%{transform:scale(1.08)}10%{transform:scale(1)}15%{transform:scale(1.06)}20%{transform:scale(1)}}
  .cover-title{font-size:38px;font-weight:800;letter-spacing:4px;opacity:0;animation:fadeUp .7s 3.7s ease forwards;
    background:linear-gradient(135deg,var(--c2),var(--c4),var(--c5));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .cover-sub{font-size:15px;color:var(--ink2);letter-spacing:1px;opacity:0;animation:fadeUp .7s 4.0s ease forwards;}
  .cover-line{width:42%;max-width:170px;height:1px;opacity:0;background:linear-gradient(90deg,transparent,rgba(160,180,220,.6),rgba(190,200,230,.8),rgba(160,180,220,.6),transparent);animation:lineIn .8s 4.2s ease forwards;}
  @keyframes lineIn{0%{opacity:0;transform:scaleX(0)}100%{opacity:.85;transform:scaleX(1)}}
  .cover-promise{font-size:13px;color:var(--ink3);line-height:1.8;opacity:0;animation:fadeUp .7s 4.4s ease forwards;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  .enter-btn{margin-top:8px;width:80%;max-width:260px;padding:15px 28px;font-size:16px;font-weight:700;color:#fff;border:none;border-radius:50px;cursor:pointer;letter-spacing:2px;position:relative;overflow:hidden;opacity:0;
    background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3),var(--c4),var(--c5),var(--c6),var(--c7),var(--c1));background-size:300% 300%;
    box-shadow:0 6px 28px rgba(123,140,255,.35);
    animation:fadeUp .6s 4.7s ease forwards, flow 6s 5.3s ease infinite, glow 2.6s 5.3s ease-in-out infinite;}
  .enter-btn::after{content:'';position:absolute;top:-50%;left:-100%;width:60%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);transform:skewX(-25deg);animation:sweep 4s 5.3s ease-in-out infinite;}
  .enter-btn:active{transform:scale(.96);filter:brightness(.95);}
  @keyframes flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  @keyframes glow{0%,100%{box-shadow:0 4px 24px rgba(123,140,255,.35)}50%{box-shadow:0 8px 40px rgba(255,154,158,.5),0 0 60px rgba(212,165,255,.28)}}
  @keyframes sweep{0%{left:-100%}45%{left:130%}100%{left:130%}}
  .cover-footer{font-size:11px;color:var(--ink3);letter-spacing:1px;opacity:0;animation:fadeUp .6s 5.0s ease forwards;}

  /* ============ 音乐开关 ============ */
  .music-toggle{position:fixed;top:max(16px,env(safe-area-inset-top));right:16px;z-index:60;width:42px;height:42px;border-radius:50%;
    background:rgba(255,255,255,.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(200,190,220,.5);
    display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 4px 14px rgba(120,100,160,.12);transition:transform .2s;}
  .music-toggle:active{transform:scale(.9);}
  .music-toggle.off{opacity:.55;}

  /* ============ 人物墙 ============ */
  #wall{overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .wall-head{text-align:center;padding:calc(max(20px,env(safe-area-inset-top)) + 20px) 24px 10px;}
  .wall-title{font-size:24px;font-weight:800;letter-spacing:3px;background:linear-gradient(135deg,var(--c2),var(--c4));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .wall-sub{font-size:12px;color:var(--ink3);margin-top:6px;letter-spacing:1px;}
  .wall-count{display:inline-block;margin-top:10px;font-size:11px;color:var(--c2);background:rgba(180,200,240,.18);padding:4px 14px;border-radius:50px;letter-spacing:1px;}

  .grid{max-width:900px;margin:0 auto;padding:14px 16px 60px;display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  @media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:820px){.grid{grid-template-columns:repeat(4,1fr);}}

  .pcard{position:relative;border-radius:14px;overflow:hidden;cursor:pointer;background:#1c1c24;
    box-shadow:0 4px 18px rgba(100,80,140,.12);opacity:0;transform:translateY(24px) scale(.96);
    transition:transform .35s cubic-bezier(.22,.61,.36,1),box-shadow .3s;aspect-ratio:3/4;}
  .pcard.revealed{opacity:1;transform:translateY(0) scale(1);}
  .pcard:active{transform:scale(.97);}
  @media(hover:hover){.pcard:hover{box-shadow:0 10px 30px rgba(123,140,255,.28);}.pcard:hover .pcard-img{transform:scale(1.06);}}
  .pcard::before{content:'';position:absolute;top:0;bottom:0;left:0;width:7px;z-index:2;background:repeating-linear-gradient(180deg,rgba(255,255,255,.85) 0 4px,transparent 4px 9px);opacity:.5;}
  .pcard::after{content:'';position:absolute;top:0;bottom:0;right:0;width:7px;z-index:2;background:repeating-linear-gradient(180deg,rgba(255,255,255,.85) 0 4px,transparent 4px 9px);opacity:.5;}
  .pcard-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s cubic-bezier(.22,.61,.36,1),opacity .5s;opacity:0;}
  .pcard-img.loaded{opacity:1;}
  .pcard-shade{position:absolute;inset:0;z-index:1;background:linear-gradient(to top,rgba(20,15,30,.82) 0%,rgba(20,15,30,.35) 35%,transparent 60%);}
  .pcard-meta{position:absolute;left:0;right:0;bottom:0;z-index:3;padding:12px 14px;text-align:left;}
  .pcard-name{color:#fff;font-size:17px;font-weight:700;letter-spacing:1px;text-shadow:0 2px 8px rgba(0,0,0,.4);}
  .pcard-note{color:rgba(255,255,255,.78);font-size:11px;margin-top:2px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pcard-num{position:absolute;top:8px;right:14px;z-index:3;font-size:10px;color:#fff;background:rgba(0,0,0,.4);padding:2px 8px;border-radius:50px;letter-spacing:.5px;}

  /* 空相框（照片待补）*/
  .pcard.empty{background:linear-gradient(160deg,#F4F1FA,#EAF0F8);}
  .pcard.empty::before,.pcard.empty::after{opacity:.25;background:repeating-linear-gradient(180deg,rgba(123,140,255,.6) 0 4px,transparent 4px 9px);}
  .frame-empty{position:absolute;inset:10px;z-index:2;border:2px dashed rgba(123,140,255,.45);border-radius:10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;text-align:center;padding:8px;}
  .fe-icon{font-size:34px;opacity:.7;}
  .fe-name{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:1px;}
  .fe-note{font-size:10px;color:var(--ink3);line-height:1.4;max-width:92%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fe-tag{margin-top:2px;font-size:10px;color:var(--c2);background:rgba(123,140,255,.14);padding:2px 10px;border-radius:50px;letter-spacing:.5px;}

  /* ============ 相册灯箱 ============ */
  #album{position:fixed;inset:0;z-index:100;background:rgba(14,10,20,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;flex-direction:column;}
  #album.active{display:flex;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .album-top{display:flex;align-items:center;gap:10px;padding:max(14px,env(safe-area-inset-top)) 18px 10px;color:#fff;flex-shrink:0;}
  .album-back{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .2s;}
  .album-back:active{background:rgba(255,255,255,.25);}
  .album-titles{flex:1;min-width:0;}
  .album-name{font-size:17px;font-weight:700;letter-spacing:1px;}
  .album-note{font-size:11px;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .album-counter{font-size:12px;color:rgba(255,255,255,.75);background:rgba(255,255,255,.12);padding:4px 12px;border-radius:50px;flex-shrink:0;letter-spacing:1px;}

  .stage{flex:1;position:relative;overflow:hidden;touch-action:pan-y;}
  .stage-track{display:flex;height:100%;will-change:transform;transition:transform .35s cubic-bezier(.22,.61,.36,1);}
  .slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:8px 14px;}
  .slide-wrap{position:relative;max-width:100%;max-height:100%;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .slide img{max-width:100%;max-height:72vh;object-fit:contain;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.5);opacity:0;transition:opacity .4s;}
  .slide img.loaded{opacity:1;}
  .slide-cap{color:rgba(255,255,255,.82);font-size:13px;text-align:center;line-height:1.6;max-width:90%;}
  .slide-frame{width:min(78vw,420px);height:62vh;max-height:560px;border:2px dashed rgba(255,255,255,.35);border-radius:12px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(255,255,255,.04);}
  .sf-icon{font-size:60px;opacity:.55;}
  .sf-text{color:rgba(255,255,255,.7);font-size:14px;letter-spacing:2px;}
  .thumb.empty{display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);font-size:18px;opacity:.7;}
  .nav-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,opacity .2s;}
  .nav-arrow:active{background:rgba(255,255,255,.3);}
  .nav-arrow.prev{left:8px;} .nav-arrow.next{right:8px;}
  .nav-arrow.hidden{opacity:0;pointer-events:none;}
  @media(max-width:560px){.nav-arrow{display:none;}}

  .thumbs{flex-shrink:0;display:flex;gap:8px;padding:10px 14px max(14px,env(safe-area-inset-bottom));overflow-x:auto;-webkit-overflow-scrolling:touch;background:rgba(0,0,0,.25);}
  .thumb{width:52px;height:52px;min-width:52px;border-radius:6px;overflow:hidden;cursor:pointer;opacity:.5;border:2px solid transparent;transition:opacity .2s,border-color .2s,transform .2s;}
  .thumb.active{opacity:1;border-color:var(--c4);transform:translateY(-2px);}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .swipe-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;font-size:11px;color:rgba(255,255,255,.6);background:rgba(0,0,0,.3);padding:5px 14px;border-radius:50px;letter-spacing:1px;animation:hintPulse 2s ease-in-out 3;pointer-events:none;}
  @keyframes hintPulse{0%,100%{opacity:.4}50%{opacity:.9}}

  .empty{padding:80px 24px;text-align:center;color:var(--ink3);font-size:14px;line-height:2;}
</style>
</head>
<body>
<canvas id="particleCanvas"></canvas>

<!-- 音乐开关（默认关闭）。要启用时把下面的 <source> 指向音频文件即可。 -->
<div class="music-toggle off" id="musicToggle" title="背景音乐">🔇</div>
<audio id="bgm" loop>
  <!-- <source src="bgm.mp3" type="audio/mpeg"> -->
</audio>

<!-- ① 封面 -->
<section class="screen active" id="cover">
  <div class="cover-flare"></div>
  <div class="cover-inner">
    <div class="cam-logo">📷</div>
    <h1 class="cover-title" id="coverTitle">毕业季</h1>
    <p class="cover-sub" id="coverSub">那些没来得及发出来的照片</p>
    <div class="cover-line"></div>
    <p class="cover-promise" id="coverPromise">答应过你们的，都在这里了。</p>
    <button class="enter-btn" id="enterBtn">进入相册</button>
    <p class="cover-footer" id="coverFooter">📷 谢谢这些年的同行</p>
  </div>
</section>

<!-- ② 人物墙 -->
<section class="screen" id="wall">
  <div class="wall-head">
    <div class="wall-title" id="wallTitle">毕业季 · 照片墙</div>
    <div class="wall-sub" id="wallSub">点开每个人，看 TA 的那一卷</div>
    <div class="wall-count" id="wallCount"></div>
  </div>
  <div class="grid" id="grid"></div>
</section>

<!-- ③ 相册灯箱 -->
<section id="album">
  <div class="album-top">
    <button class="album-back" id="albumBack" aria-label="返回">‹</button>
    <div class="album-titles">
      <div class="album-name" id="albumName"></div>
      <div class="album-note" id="albumNote"></div>
    </div>
    <div class="album-counter" id="albumCounter"></div>
  </div>
  <div class="stage" id="stage">
    <button class="nav-arrow prev" id="navPrev">‹</button>
    <button class="nav-arrow next" id="navNext">›</button>
    <div class="stage-track" id="stageTrack"></div>
    <div class="swipe-hint" id="swipeHint">← 左右滑动看更多 →</div>
  </div>
  <div class="thumbs" id="thumbs"></div>
</section>

<script src="gallery.js"></script>
<script>
(function(){
  "use strict";
  const $ = s => document.querySelector(s);

  /* ---------- 文案 ---------- */
  const T = (typeof SITE_TEXT !== 'undefined') ? SITE_TEXT : {};
  if(T.title){ $('#coverTitle').textContent = T.title; }
  if(T.subtitle){ $('#coverSub').textContent = T.subtitle; }
  if(T.promise){ $('#coverPromise').textContent = T.promise; }
  if(T.enterBtn){ $('#enterBtn').textContent = T.enterBtn; }
  if(T.footer){ $('#coverFooter').textContent = T.footer; }

  const DATA = (typeof GALLERY !== 'undefined' && Array.isArray(GALLERY)) ? GALLERY : [];

  /* ---------- 粒子背景 ---------- */
  (function particles(){
    const cv = $('#particleCanvas'), ctx = cv.getContext('2d');
    let w,h,dots=[];
    const COLORS=['#7B8CFF','#D4A5FF','#FF9A9E','#FFCD56','#A8D8C8','#6CB4EE'];
    function resize(){ w=cv.width=innerWidth; h=cv.height=innerHeight; }
    function init(){
      resize();
      const n = Math.min(46, Math.floor(w*h/26000));
      dots = Array.from({length:n},()=>({
        x:Math.random()*w, y:Math.random()*h,
        r:Math.random()*2+.6, vx:(Math.random()-.5)*.25, vy:(Math.random()-.5)*.25,
        c:COLORS[Math.floor(Math.random()*COLORS.length)], a:Math.random()*.4+.15
      }));
    }
    function tick(){
      ctx.clearRect(0,0,w,h);
      for(const d of dots){
        d.x+=d.vx; d.y+=d.vy;
        if(d.x<0||d.x>w)d.vx*=-1; if(d.y<0||d.y>h)d.vy*=-1;
        ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fillStyle=d.c; ctx.globalAlpha=d.a; ctx.fill();
      }
      ctx.globalAlpha=1;
      requestAnimationFrame(tick);
    }
    init(); tick();
    addEventListener('resize', init);
  })();

  /* ---------- 封面入场特效（相机+胶片+火花）---------- */
  (function intro(){
    const colorsCSV='#7B8CFF,#FFCD56,#FF9A9E,#6CB4EE,#D4A5FF,#A8D8C8'.split(',');
    function strip(cls){
      const s=document.createElement('div'); s.className='film-strip '+cls;
      const body=document.createElement('div'); body.className='film-body';
      const scroll=document.createElement('div'); scroll.className='film-scroll';
      for(let i=0;i<28;i++){ const f=document.createElement('div'); f.className='film-frame';
        f.style.background=`linear-gradient(135deg,${colorsCSV[i%6]},${colorsCSV[(i+2)%6]})`; scroll.appendChild(f); }
      body.appendChild(scroll); s.appendChild(body); document.body.appendChild(s);
      setTimeout(()=>s.remove(),4600);
    }
    strip('top'); strip('bottom');
    const cam=document.createElement('div'); cam.className='big-camera'; cam.textContent='📷'; document.body.appendChild(cam);
    const flash=document.createElement('div'); flash.className='cover-flash'; document.body.appendChild(flash);
    const cx=innerWidth/2, cy=innerHeight*0.42;
    for(let i=0;i<14;i++){
      const sp=document.createElement('div'); sp.className='spark';
      const ang=(Math.PI*2/14)*i, dist=70+Math.random()*60;
      sp.style.left=cx+'px'; sp.style.top=cy+'px';
      sp.style.setProperty('--sx',Math.cos(ang)*dist+'px');
      sp.style.setProperty('--sy',Math.sin(ang)*dist+'px');
      sp.style.background=colorsCSV[i%6];
      document.body.appendChild(sp);
    }
    setTimeout(()=>{ cam.remove(); flash.remove(); document.querySelectorAll('.spark').forEach(s=>s.remove()); },3600);
  })();

  /* ---------- 屏幕切换 ---------- */
  function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    $('#'+id).classList.add('active');
  }

  /* ---------- 人物墙 ---------- */
  let revealObserver;
  function buildWall(){
    const grid=$('#grid');
    if(T.title){ $('#wallTitle').textContent = T.title + ' · 照片墙'; }
    if(!DATA.length){
      grid.innerHTML='<div class="empty">还没有照片。<br>把照片放进 photos/ 文件夹，<br>并在 gallery.js 里登记即可。</div>';
      $('#wallCount').textContent='';
      return;
    }
    const total=DATA.reduce((s,p)=>s+(p.photos?p.photos.length:0),0);
    $('#wallCount').textContent=`${DATA.length} 个人 · ${total} 张照片`;

    revealObserver=new IntersectionObserver((entries)=>{
      entries.forEach((e,i)=>{ if(e.isIntersecting){ const el=e.target;
        setTimeout(()=>el.classList.add('revealed'), (el.dataset.idx%8)*60);
        revealObserver.unobserve(el); } });
    },{threshold:.12});

    grid.innerHTML='';
    DATA.forEach((p,idx)=>{
      const card=document.createElement('div'); card.className='pcard'; card.dataset.idx=idx;
      const count=p.photos?p.photos.length:0;
      const cover=coverSrc(p);
      if(cover){
        const img=document.createElement('img'); img.className='pcard-img'; img.loading='lazy';
        img.alt=p.name||''; img.src=cover;
        img.addEventListener('load',()=>img.classList.add('loaded'));
        card.innerHTML=`<div class="pcard-shade"></div>
          <div class="pcard-num">${count} 张</div>
          <div class="pcard-meta"><div class="pcard-name">${esc(p.name||'')}</div>${p.note?`<div class="pcard-note">${esc(p.note)}</div>`:''}</div>`;
        card.insertBefore(img,card.firstChild);
      } else {
        // 还没有照片 —— 显示空相框
        card.classList.add('empty');
        card.innerHTML=`<div class="pcard-num">${count} 个位</div>
          <div class="frame-empty">
            <div class="fe-icon">🖼️</div>
            <div class="fe-name">${esc(p.name||'')}</div>
            ${p.note?`<div class="fe-note">${esc(p.note)}</div>`:''}
            <div class="fe-tag">照片待补</div>
          </div>`;
      }
      card.addEventListener('click',()=>openAlbum(idx));
      grid.appendChild(card);
      revealObserver.observe(card);
    });
  }
  function hasImg(ph){ return !!(ph && ph.src); }
  function coverSrc(p){
    if(p.cover) return p.cover;
    if(p.photos){ const f=p.photos.find(hasImg); if(f) return f.src; }
    return null;
  }
  function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  /* ---------- 相册灯箱 ---------- */
  let curPerson=null, curIdx=0;
  const stage=$('#stage'), track=$('#stageTrack');

  function openAlbum(personIdx){
    curPerson=DATA[personIdx]; curIdx=0;
    const photos=curPerson.photos||[];
    $('#albumName').textContent=curPerson.name||'';
    $('#albumNote').textContent=curPerson.note||'';
    track.innerHTML=''; $('#thumbs').innerHTML='';

    photos.forEach((ph,i)=>{
      const slide=document.createElement('div'); slide.className='slide';
      const wrap=document.createElement('div'); wrap.className='slide-wrap';
      if(hasImg(ph)){
        const im=document.createElement('img'); im.alt=curPerson.name||'';
        im.dataset.src=ph.src; // 懒加载：进入时再赋 src
        im.addEventListener('load',()=>im.classList.add('loaded'));
        wrap.appendChild(im);
        if(ph.caption){ const c=document.createElement('div'); c.className='slide-cap'; c.textContent=ph.caption; wrap.appendChild(c); }
      } else {
        wrap.innerHTML=`<div class="slide-frame"><div class="sf-icon">📷</div><div class="sf-text">照片待补 · 第 ${i+1} 张</div></div>`;
      }
      slide.appendChild(wrap); track.appendChild(slide);

      const th=document.createElement('div'); th.className='thumb'+(i===0?' active':'')+(hasImg(ph)?'':' empty');
      if(hasImg(ph)){ const ti=document.createElement('img'); ti.loading='lazy'; ti.src=ph.src; th.appendChild(ti); }
      else { th.textContent='🖼️'; }
      th.addEventListener('click',()=>goTo(i));
      $('#thumbs').appendChild(th);
    });

    $('#swipeHint').style.display = photos.length>1 ? 'block' : 'none';
    $('#album').classList.add('active');
    requestAnimationFrame(()=>goTo(0,true));
  }

  function loadAround(i){
    const slides=track.children;
    [i-1,i,i+1].forEach(k=>{ const s=slides[k]; if(!s)return;
      const im=s.querySelector('img'); if(im&&!im.src&&im.dataset.src) im.src=im.dataset.src; });
  }
  function goTo(i,instant){
    const photos=curPerson.photos||[]; if(!photos.length)return;
    curIdx=Math.max(0,Math.min(i,photos.length-1));
    if(instant){ track.style.transition='none'; requestAnimationFrame(()=>{track.style.transition='';}); }
    track.style.transform=`translateX(${-curIdx*100}%)`;
    loadAround(curIdx);
    $('#albumCounter').textContent=`${curIdx+1} / ${photos.length}`;
    const thumbs=$('#thumbs').children;
    Array.from(thumbs).forEach((t,k)=>t.classList.toggle('active',k===curIdx));
    if(thumbs[curIdx]) thumbs[curIdx].scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
    $('#navPrev').classList.toggle('hidden',curIdx===0);
    $('#navNext').classList.toggle('hidden',curIdx===photos.length-1);
  }
  function closeAlbum(){ $('#album').classList.remove('active'); curPerson=null; }

  $('#albumBack').addEventListener('click',closeAlbum);
  $('#navPrev').addEventListener('click',()=>goTo(curIdx-1));
  $('#navNext').addEventListener('click',()=>goTo(curIdx+1));
  addEventListener('keydown',e=>{
    if(!$('#album').classList.contains('active'))return;
    if(e.key==='ArrowLeft')goTo(curIdx-1);
    else if(e.key==='ArrowRight')goTo(curIdx+1);
    else if(e.key==='Escape')closeAlbum();
  });

  /* 触摸滑动 */
  let sx=0,sy=0,dx=0,dragging=false;
  stage.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; dx=0; dragging=true; track.style.transition='none'; },{passive:true});
  stage.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const mx=e.touches[0].clientX-sx, my=e.touches[0].clientY-sy;
    if(Math.abs(mx)>Math.abs(my)){ dx=mx; track.style.transform=`translateX(calc(${-curIdx*100}% + ${dx}px))`; }
  },{passive:true});
  stage.addEventListener('touchend',()=>{
    if(!dragging)return; dragging=false; track.style.transition='';
    const th=stage.offsetWidth*0.18;
    if(dx<-th)goTo(curIdx+1); else if(dx>th)goTo(curIdx-1); else goTo(curIdx);
    dx=0;
  });

  /* ---------- 音乐开关（默认关）---------- */
  const bgm=$('#bgm'), mt=$('#musicToggle');
  let musicOn=false;
  const hasAudio=()=>bgm.querySelector('source');
  mt.addEventListener('click',()=>{
    if(!hasAudio()){ flash(mt); return; } // 未配置音频时点击无效
    musicOn=!musicOn;
    if(musicOn){ bgm.play().catch(()=>{}); mt.textContent='🔊'; mt.classList.remove('off'); }
    else{ bgm.pause(); mt.textContent='🔇'; mt.classList.add('off'); }
  });
  function flash(el){ el.style.transform='scale(.8)'; setTimeout(()=>el.style.transform='',150); }

  /* ---------- 进入 ---------- */
  buildWall();
  $('#enterBtn').addEventListener('click',()=>{
    show('wall');
    if(musicOn&&hasAudio()) bgm.play().catch(()=>{});
  });
})();
</script>
</body>
</html>
